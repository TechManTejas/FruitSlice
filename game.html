<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FruitSlice</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0d1a; overflow: hidden; font-family: system-ui, sans-serif; user-select: none; }
  canvas { display: block; position: fixed; inset: 0; }

  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: center; align-items: center;
    padding: 20px 24px; pointer-events: none; z-index: 10;
  }
  #score { color: #fff; font-size: 32px; font-weight: 300; letter-spacing: 2px; opacity: 0.8; }

  #status {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.07); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 99px;
    padding: 10px 22px; color: rgba(255,255,255,0.5); font-size: 13px;
    z-index: 10; white-space: nowrap;
  }

  #pairing {
    position: fixed; inset: 0; background: rgba(10,10,20,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; gap: 20px;
  }
  #pairing h1 { color: #fff; font-size: 28px; font-weight: 300; letter-spacing: 4px; }
  #pairing p { color: rgba(255,255,255,0.4); font-size: 14px; text-align: center; max-width: 320px; line-height: 1.7; }
  #peer-id-box {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px; padding: 16px 32px;
    color: #ffd700; font-size: 32px; font-weight: 700; letter-spacing: 8px;
    font-family: monospace;
  }
  #qr-wrap { background: #fff; border-radius: 12px; padding: 10px; }

  #cursor {
    position: fixed; pointer-events: none; z-index: 50;
    width: 36px; height: 36px; transform: translate(-50%, -50%);
    transition: left 0.05s linear, top 0.05s linear;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div id="score">0</div>
</div>

<svg id="cursor" viewBox="0 0 36 36">
  <line x1="18" y1="2" x2="18" y2="34" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="2" y1="18" x2="34" y2="18" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="18" cy="18" r="5" fill="none" stroke="#ffd700" stroke-width="1.5"/>
</svg>

<div id="status">⏳ Waiting for phone controller...</div>

<div id="pairing">
  <h1>🍉 FRUITSLICE</h1>
  <p>Open the controller page on your phone and enter this code</p>
  <div id="peer-id-box">------</div>
  <div id="qr-wrap"><div id="qr"></div></div>
  <p id="ctrl-url" style="font-size:11px; word-break:break-all; max-width:340px; color:rgba(255,255,255,0.25);"></p>
  <p style="font-size:12px; color:rgba(255,255,255,0.25);">Both devices must be on the same Wi-Fi</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');
const pairingEl = document.getElementById('pairing');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Game state
let fruits = [], slashTrail = [], particles = [], halves = [];
let score = 0, gameActive = false;
let cx = 100, cy = 100;
let spawnTimer = 0;

const PALETTE = [
  { fill: '#ff6b6b', inner: '#ff9999', shadow: 'rgba(255,80,80,0.4)' },
  { fill: '#ffd93d', inner: '#ffe88a', shadow: 'rgba(255,200,0,0.4)' },
  { fill: '#ff9f43', inner: '#ffbe76', shadow: 'rgba(255,140,0,0.4)' },
  { fill: '#a29bfe', inner: '#c7c2ff', shadow: 'rgba(120,100,255,0.4)' },
  { fill: '#55efc4', inner: '#a8f0df', shadow: 'rgba(0,200,150,0.4)' },
  { fill: '#fd79a8', inner: '#fbaac8', shadow: 'rgba(220,60,140,0.4)' },
  { fill: '#74b9ff', inner: '#a8d4ff', shadow: 'rgba(50,130,255,0.4)' },
];

class Fruit {
  constructor() {
    // Much wider size variety: tiny (18) to huge (52)
    this.r = 18 + Math.random() * 34;
    // 70% from bottom (arcing up), 15% from left, 15% from right
    const roll = Math.random();
    if (roll < 0.15) {
      // left side
      this.x = -this.r;
      this.y = H * 0.2 + Math.random() * H * 0.6;
      this.vx = 0.7 + Math.random() * 0.8;
      this.vy = -0.6 + Math.random() * 0.4;
    } else if (roll < 0.30) {
      // right side
      this.x = W + this.r;
      this.y = H * 0.2 + Math.random() * H * 0.6;
      this.vx = -(0.7 + Math.random() * 0.8);
      this.vy = -0.6 + Math.random() * 0.4;
    } else {
      // bottom — reach 78% to 100% of screen height
      // physics: peak height = vy² / (2 * gravity)
      // with gravity=0.022: vy = sqrt(2 * 0.022 * H * coverage)
      this.x = W * 0.08 + Math.random() * W * 0.84;
      this.y = H + this.r;
      const minVy = Math.sqrt(2 * 0.022 * H * 0.78);
      const maxVy = Math.sqrt(2 * 0.022 * H * 1.00);
      this.vy = -(minVy + Math.random() * (maxVy - minVy));
      this.vx = -0.8 + Math.random() * 1.6;
    }
    this.gravity = 0.022; // low gravity = tall floaty arcs, slow fall
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.006; // slow lazy spin
    const c = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    this.fill = c.fill; this.inner = c.inner; this.shadow = c.shadow;
    this.sliced = false;
    this.offscreen = false;
    this.wobble = Math.random() * Math.PI * 2;
    this.wobbleSpeed = 0.02 + Math.random() * 0.01;
  }

  update() {
    this.vy += this.gravity * TIME_SCALE;
    this.x += this.vx * TIME_SCALE;
    this.y += this.vy * TIME_SCALE;
    this.rot += this.rotSpeed * TIME_SCALE;
    this.wobble += this.wobbleSpeed * TIME_SCALE;
    if (this.x < -this.r * 4 || this.x > W + this.r * 4 || this.y > H + this.r * 4) {
      this.offscreen = true;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    // glow
    ctx.shadowColor = this.shadow;
    ctx.shadowBlur = 24;
    // main circle
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.fill;
    ctx.fill();
    ctx.shadowBlur = 0;
    // inner lighter circle
    ctx.beginPath();
    ctx.arc(this.r * 0.05, this.r * 0.05, this.r * 0.62, 0, Math.PI * 2);
    ctx.fillStyle = this.inner;
    ctx.globalAlpha = 0.25;
    ctx.fill();
    ctx.globalAlpha = 1;
    // shine dot
    ctx.beginPath();
    ctx.arc(-this.r * 0.28, -this.r * 0.28, this.r * 0.18, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();
    ctx.restore();
  }

  hitTest(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const fx = x1 - this.x, fy = y1 - this.y;
    const a = dx*dx + dy*dy;
    if (a < 0.001) return false;
    const b = 2*(fx*dx + fy*dy);
    const c2 = fx*fx + fy*fy - this.r*this.r;
    const disc = b*b - 4*a*c2;
    if (disc < 0) return false;
    const sd = Math.sqrt(disc);
    const t1 = (-b - sd)/(2*a), t2 = (-b + sd)/(2*a);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1);
  }
}

class Half {
  constructor(fruit, dir) {
    this.x = fruit.x; this.y = fruit.y; this.r = fruit.r;
    this.fill = fruit.fill; this.inner = fruit.inner;
    this.rot = fruit.rot;
    this.vx = fruit.vx + dir * 1.5;
    this.vy = fruit.vy - 1.5;
    this.gravity = 0.025;
    this.rotSpeed = dir * 0.04;
    this.life = 1; this.dir = dir;
  }
  update() {
    this.x += this.vx * TIME_SCALE; this.y += this.vy * TIME_SCALE;
    this.vy += this.gravity * TIME_SCALE; this.rot += this.rotSpeed * TIME_SCALE;
    this.life -= 0.018 * TIME_SCALE;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI, this.dir < 0);
    ctx.closePath();
    ctx.fillStyle = this.fill;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, this.r * 0.6, 0, Math.PI, this.dir < 0);
    ctx.closePath();
    ctx.fillStyle = this.inner;
    ctx.globalAlpha *= 0.5;
    ctx.fill();
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*6;
    this.vy = (Math.random()-0.5)*6 - 2;
    this.life = 1;
    this.decay = 0.022 + Math.random()*0.02;
    this.r = 3 + Math.random()*6;
    this.color = color;
    this.gravity = 0.08;
  }
  update() { this.x+=this.vx*TIME_SCALE; this.y+=this.vy*TIME_SCALE; this.vy+=this.gravity*TIME_SCALE; this.life-=this.decay*TIME_SCALE; }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life * 0.8);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * this.life, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

class ScorePopup {
  constructor(x, y, text) {
    this.x = x; this.y = y; this.text = text;
    this.life = 1; this.vy = -1.2;
  }
  update() { this.y += this.vy * TIME_SCALE; this.life -= 0.02 * TIME_SCALE; }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = '#ffd700';
    ctx.font = '500 22px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(this.text, this.x, this.y);
    ctx.restore();
  }
}

let popups = [];

function spawnFruit() {
  fruits.push(new Fruit());
}

function sliceFruit(f) {
  if (f.sliced) return;
  f.sliced = true;
  for (let i = 0; i < 14; i++) particles.push(new Particle(f.x, f.y, f.fill));
  halves.push(new Half(f, -1));
  halves.push(new Half(f, 1));
  score++;
  scoreEl.textContent = score;
  popups.push(new ScorePopup(f.x, f.y - f.r - 10, '+1'));
}

function trySlice() {
  fruits.forEach(f => {
    if (f.sliced) return;

    // 1. Point-in-circle: fruit flew into cursor (works even when cursor is still)
    const distToCursor = Math.hypot(f.x - cx, f.y - cy);
    if (distToCursor < f.r + 10) { // +10 for the cursor's own visual radius
      sliceFruit(f);
      return;
    }

    // 2. Slash-line intersection: cursor moved fast enough to sweep through fruit
    if (slashTrail.length < 2) return;
    const p = slashTrail[slashTrail.length - 2];
    const q = slashTrail[slashTrail.length - 1];
    if (Math.hypot(q.x - p.x, q.y - p.y) >= 2 && f.hitTest(p.x, p.y, q.x, q.y)) {
      sliceFruit(f);
    }
  });
  fruits = fruits.filter(f => !f.sliced);
}

// starfield background
const stars = Array.from({length: 80}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.5 + Math.random() * 1.2,
  a: 0.1 + Math.random() * 0.4,
  twinkle: Math.random() * Math.PI * 2,
  speed: 0.005 + Math.random() * 0.01
}));

let frame = 0;
const TIME_SCALE = 0.5; // global speed multiplier — 0.5 = half speed

function draw() {
  ctx.clearRect(0, 0, W, H);

  // bg gradient
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  bg.addColorStop(0, '#141428');
  bg.addColorStop(1, '#06060f');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // stars
  stars.forEach(s => {
    s.twinkle += s.speed * TIME_SCALE;
    const a = s.a * (0.6 + 0.4 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  });

  if (!gameActive) { requestAnimationFrame(draw); return; }

  updateCursor();
  frame++;

  // spawn — more frequent, bigger waves for a fuller screen
  spawnTimer++;
  if (spawnTimer >= 50) {
    spawnTimer = 0;
    spawnFruit();
    spawnFruit(); // always spawn at least 2
    if (Math.random() < 0.65) spawnFruit(); // frequent triple
    if (Math.random() < 0.35) spawnFruit(); // occasional quad
    if (Math.random() < 0.15) spawnFruit(); // rare quint burst
  }

  // update
  fruits.forEach(f => f.update());
  fruits = fruits.filter(f => !f.offscreen);
  halves.forEach(h => h.update());
  halves = halves.filter(h => h.life > 0);
  particles.forEach(p => p.update());
  particles = particles.filter(p => p.life > 0);
  popups.forEach(p => p.update());
  popups = popups.filter(p => p.life > 0);

  // draw halves first (behind whole fruits)
  halves.forEach(h => h.draw());
  particles.forEach(p => p.draw());
  fruits.forEach(f => f.draw());
  popups.forEach(p => p.draw());

  // slash trail
  slashTrail.push({ x: cx, y: cy });
  if (slashTrail.length > 22) slashTrail.shift();

  for (let i = 1; i < slashTrail.length; i++) {
    const a = slashTrail[i-1], b = slashTrail[i];
    const progress = i / slashTrail.length;
    const alpha = progress * 0.9;
    const width = progress * 4;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255, 240, 100, ${alpha})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  trySlice();
  requestAnimationFrame(draw);
}

// ── PeerJS ──
const myId = Math.random().toString(36).substr(2, 6).toUpperCase();
let peer, conn;

function initPeer() {
  peer = new Peer(myId, {
    host: '0.peerjs.com', port: 443, path: '/', secure: true,
    config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
  });

  peer.on('open', id => {
    document.getElementById('peer-id-box').textContent = id;
    const base = location.href.replace(/[^\/]*$/, '');
    const ctrlUrl = `${base}controller.html?code=${id}`;
    document.getElementById('ctrl-url').textContent = ctrlUrl;
    new QRCode(document.getElementById('qr'), {
      text: ctrlUrl, width: 150, height: 150,
      colorDark: '#000', colorLight: '#fff'
    });
  });

  peer.on('connection', c => {
    conn = c;
    conn.on('open', () => {
      pairingEl.style.display = 'none';
      statusEl.textContent = '📱 Phone connected — point to slice!';
      gameActive = true;
    });
    conn.on('data', handleData);
    conn.on('close', () => {
      statusEl.textContent = '📵 Phone disconnected. Reload to reconnect.';
      gameActive = false;
    });
  });

  peer.on('error', e => {
    statusEl.textContent = '⚠️ ' + e.type;
  });
}

// Pointer state
let targetX = W / 2, targetY = H / 2;

// Adaptive smoothing — feels like a laser: snappy when moving fast, stable when still
let velX = 0, velY = 0;

function handleData(data) {
  if (data.type === 'pointer') {
    targetX = data.nx * W;
    targetY = data.ny * H;
  }
  if (data.type === 'calibrate') {
    targetX = W / 2;
    targetY = H / 2;
    cx = W / 2;
    cy = H / 2;
  }
}

function updateCursor() {
  const dx = targetX - cx;
  const dy = targetY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // Adaptive lerp: faster when far (laser snappiness), gentler when close (stability)
  // At 200px away -> lerp 0.25, at 10px -> lerp 0.08
  const lerp = Math.min(0.28, Math.max(0.07, dist / 700));

  cx += dx * lerp;
  cy += dy * lerp;

  cursorEl.style.left = Math.round(cx) + 'px';
  cursorEl.style.top  = Math.round(cy) + 'px';
}

initPeer();
draw();
</script>
</body>
</html>
